<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>SCELE Summary</title>
    <link rel="stylesheet" href="dashboard.css">
    <script>
        try {
            if (localStorage.getItem('scele-summary-theme') === 'dark') {
                document.documentElement.classList.add('preload-dark');
            }
        } catch {}
    </script>
    <style>html.preload-dark body { background: #0d1117; color: #c9d1d9; }</style>
</head>
<body>
    <button class="theme-toggle" id="theme-toggle" title="Toggle theme" aria-label="Toggle theme">🌙</button>
    <div class="container">
        <h1>📋 SCELE Summary</h1>
        <div class="subtitle">All your assignments and quizzes, sorted by deadline</div>
        <div class="status-bar" id="status">
            <div class="spinner"></div>
            <span id="status-text">Fetching your courses…</span>
        </div>
        <div id="content"></div>
    </div>

    <script src="../lib/dates.js"></script>
    <script src="../lib/http.js"></script>
    <script src="../lib/html.js"></script>
    <script src="../lib/storage.js"></script>
    <script src="../lib/forum-parser.js"></script>
    <script src="../features/assignments.js"></script>
    <script src="../features/announcements.js"></script>
    <script src="../features/forums.js"></script>
    <script src="dashboard.js"></script>
</body>
</html>
